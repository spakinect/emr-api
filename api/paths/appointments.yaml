post:
  summary: Creates a new At-Home Visit
  description: >
    Creates a new At-Home Visit (Good Faith Exam (GFE)) in the Spakinect system.
    The patient will be emailed and texted a link to complete their GFE prior to
    their appointment at the medspa.
    Optionally, EMR systems can submit intake answers when creating the appointment;
    these are pre-filled for the patient when they start the visit.
  operationId: createAppointment
  tags:
    - Appointments
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../emr-openapi.yaml#/components/schemas/CreateAppointmentRequest"
        examples:
          standard_appointment:
            summary: Standard appointment creation
            value:
              patient_details:
                first_name: John
                last_name: Doe
                email: john.doe@example.com
                phone: "+1234567890"
              location_id: loc_12345
              appointment_time: 1640995200
              requested_treatments:
                - Botox Injection
                - Dermal Filler
          with_intake_answers:
            summary: Appointment with EMR-submitted intake answers
            value:
              patient_details:
                first_name: Jane
                last_name: Smith
                email: jane.smith@example.com
                phone: "+1987654321"
              location_id: loc_12345
              appointment_time: 1640995200
              requested_treatments:
                - Botox Injection
              intake_answers:
                - question: pregnant-breastfeeding-ivf
                  answer: No
                - question: allergies
                  answer:
                    selected: yes
                    items:
                      - Penicillin
                - question: medications
                  answer:
                    selected: yes
                    items:
                      - Botox (previous)
  responses:
    "201":
      description: Appointment created successfully
      content:
        application/json:
          schema:
            $ref: "../emr-openapi.yaml#/components/schemas/CreateAppointmentResponse"
          examples:
            success:
              summary: Successful appointment creation
              value:
                success: true
                gfe_id: gfe_abc123xyz789
    "400":
      $ref: "../emr-openapi.yaml#/components/responses/BadRequest"
    "401":
      $ref: "../emr-openapi.yaml#/components/responses/Unauthorized"
    "403":
      $ref: "../emr-openapi.yaml#/components/responses/Forbidden"
    "404":
      $ref: "../emr-openapi.yaml#/components/responses/NotFound"
    "500":
      $ref: "../emr-openapi.yaml#/components/responses/InternalServerError"
