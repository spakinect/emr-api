CreateAppointmentRequest:
  type: object
  required:
    - patient_details
    - location_id
    - appointment_time
    - requested_treatments
  properties:
    patient_details:
      $ref: ./patient.yaml#/PatientDetails
    location_id:
      type: string
      description: The ID of the location where the appointment will take place
      example: loc_12345
    appointment_time:
      type: integer
      description: >
        Unix timestamp of the appointment date and time with the medspa. This is
        different from the appointment time with Spakinect (provider). To schedule
        an appointment with a Spakinect provider, the patient can use the Schedule
        link in the email sent from Spakinect.
      example: 1640995200
      minimum: 1
    requested_treatments:
      type: array
      description: List of treatment names requested for this appointment
      items:
        type: string
      minItems: 1
      example:
        - Botox Injection
        - Dermal Filler
    intake_answers:
      x-optional: true
      type: array
      description: >
        Submit intake question answers while creating the appointment for at-home visit patients so they can review and modify them if needed.
        Supported question and formats:
        - pregnant-breastfeeding-ivf (single choice): "Yes", "No", or "N/A"
        - allergies (yes/no list): { "selected": "yes"|"no", "items": ["..."] }; when selected is "no", items must be []
        - medical-conditions (yes/no list): same format as allergies
        - medications (yes/no list): same format as allergies
      items:
        type: object
        required:
          - question
          - answer
        properties:
          question:
            type: string
            description: >
              The question_code. Supported: pregnant-breastfeeding-ivf, allergies, medical-conditions, medications.
          answer:
            oneOf:
              - type: string
                description: For single choice (pregnant-breastfeeding-ivf). Must be "Yes", "No", or "N/A".
                enum:
                  - Yes
                  - No
                  - N/A
              - type: object
                description: For yes_no_list (allergies, medical-conditions, medications). When selected is "no", items must be [].
                required:
                  - selected
                  - items
                properties:
                  selected:
                    type: string
                    enum:
                      - yes
                      - no
                  items:
                    type: array
                    description: List of items (must be empty when selected is "no")
                    items:
                      type: string
  additionalProperties: false

CreateAppointmentResponse:
  type: object
  required:
    - success
    - gfe_id
  properties:
    success:
      type: boolean
      description: Indicates if the appointment was created successfully
      example: true
    gfe_id:
      type: string
      description: Unique identifier for the created GFE appointment
      example: gfe_abc123xyz789
  additionalProperties: false

CancelAppointmentResponse:
  type: object
  required:
    - gfe_id
    - status
  properties:
    gfe_id:
      type: string
      description: Unique identifier for the cancelled GFE appointment
      example: gfe_abc123xyz789
    status:
      type: string
      description: The updated status of the appointment after cancellation
      example: Cancelled by client
  additionalProperties: false
